<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOEX Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f4f6f8; }
.card { background:white; padding:20px; max-width:500px; margin:auto; }
.green { color:green; }
.red { color:red; }
</style>
</head>

<body>

<div class="card">

<h2>📊 MOEX Портфель</h2>

<div style="text-align:center;">
<a href="https://angel-help.ru/" target="_blank">
<img src="https://via.placeholder.com/468x120?text=Angel+Help" style="width:100%;">
</a>
</div>

<form method="post">
<input name="check_ticker" placeholder="Тикер">
<button>Показать график</button>
</form>

<canvas id="chart"></canvas>

<table border="1" width="100%">
<tr><th>Тикер</th><th>Кол-во</th><th>Цена</th><th>Сумма</th></tr>

{% for r in portfolio %}
<tr>
<td>{{ r.ticker }}</td>
<td>{{ r.qty }}</td>
<td>{{ r.price }}</td>
<td>{{ r.value }}</td>
</tr>
{% endfor %}

</table>

<div>Итого: {{ total }}</div>

<div>💰 Прибыль: <span id="profit"></span></div>

</div>

<script>
let chart;

async function loadChart(ticker){
    const res = await fetch(`/history/${ticker}`);
    const data = await res.json();

    const labels = data.map(d => d.date);
    const prices = data.map(d => d.price);

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById('chart'), {
        type:'line',
        data:{
            labels:labels,
            datasets:[{label:ticker, data:prices}]
        }
    });

    if(prices.length > 1){
        let change = ((prices.at(-1) - prices[0]) / prices[0] * 100).toFixed(2);
        let el = document.getElementById("profit");
        el.innerText = change + "%";
        el.className = change >= 0 ? "green" : "red";
    }
}

{% if checked_ticker %}
loadChart("{{ checked_ticker }}");
{% endif %}
</script>

</body>
</html>
