<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOEX Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Inter, Arial;
    background:#f4f6f8;
    margin:0;
    padding-top:50px;
}

.card {
    background:white;
    width:95%;
    max-width:500px;
    margin:40px auto;
    padding:20px;
    border-radius:14px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

input, button {
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
    border:1px solid #ccc;
}

button {
    background:#2563eb;
    color:white;
    border:none;
}

table {
    width:100%;
    margin-top:20px;
}

td, th {
    padding:6px;
    text-align:center;
}

.green { color:#22c55e; }
.red { color:#dc2626; }

.ad {
    margin-top:20px;
    text-align:center;
}
</style>
</head>

<body>

<div class="card">

<h2>📊 MOEX Портфель</h2>

<!-- реклама -->
<div class="ad">
    <div style="font-size:12px;color:gray;">Реклама</div>
    <a href="https://angel-help.ru/" target="_blank">
        <img src="https://via.placeholder.com/468x120?text=Angel+Help"
             style="width:100%;border-radius:10px;">
    </a>
</div>

<form method="post">
<input name="check_ticker" placeholder="Тикер" autofocus>
<button>Узнать цену</button>
</form>

{% if checked_price %}
<h3>Цена: {{ checked_price }}</h3>
{% endif %}

<form method="post">
<input name="add_ticker" placeholder="Тикер">
<input name="add_qty" placeholder="Количество">
<button>Добавить</button>
</form>

<table>
<tr><th>Тикер</th><th>Кол-во</th><th>Цена</th><th>Сумма</th></tr>

{% set total_buy = 0 %}
{% for r in portfolio %}
<tr>
<td>{{ r.ticker }}</td>
<td>{{ r.qty }}</td>
<td>{{ r.price }}</td>
<td>{{ r.value }}</td>
</tr>
{% endfor %}
</table>

<div class="total">
Итого: {{ total }}
</div>

<!-- прибыль -->
<div>
📈 Прибыль: <span id="profit"></span>
</div>

<!-- график -->
<canvas id="chart" height="200"></canvas>

<!-- реклама -->
<div class="ad">
    <a href="https://angel-help.ru/" target="_blank">
        <img src="https://via.placeholder.com/468x120?text=Angel+Help"
             style="width:100%;border-radius:10px;">
    </a>
</div>

</div>

<script>
// график (пример)
const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['1','2','3','4','5'],
        datasets: [{
            label: 'Цена',
            data: [10, 20, 15, 30, 25]
        }]
    }
});

// fake прибыль (можно потом улучшить)
document.getElementById("profit").innerText = "+10%";
</script>

</body>
</html>
