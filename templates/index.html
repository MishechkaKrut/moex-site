<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>MOEX Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {font-family: Arial;background:#0f172a;color:white;margin:0;padding:20px;}
    .container {max-width:1000px;margin:auto;}
    .card {background:#1e293b;padding:20px;border-radius:12px;margin-bottom:20px;}
    input,button {padding:10px;border-radius:8px;border:none;margin-right:10px;}
    button {background:#3b82f6;color:white;cursor:pointer;}
  </style>
</head>
<body>
<div class="container">
  <h1>📊 MOEX Tracker</h1>

  <div class="card">
    <h2>🌍 Время</h2>
    <p>Лондон: <span id="london"></span></p>
    <p>Нью-Йорк: <span id="ny"></span></p>
    <p>Москва: <span id="moscow"></span></p>
    <p>Гонконг: <span id="hk"></span></p>
  </div>

  <div class="card">
    <h2>🔍 Поиск акции</h2>
    <input type="text" id="ticker" placeholder="SBER" oninput="suggest()">
    <button onclick="loadData()">Загрузить</button>
    <div id="suggestions"></div>
    <p id="price"></p>
  </div>

  <div class="card">
    <h2>📈 График</h2>
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
// TIME
function updateTime() {
  const opt={hour:'2-digit',minute:'2-digit',second:'2-digit'};
  london.textContent=new Intl.DateTimeFormat('en-GB',{...opt,timeZone:'Europe/London'}).format(new Date());
  ny.textContent=new Intl.DateTimeFormat('en-US',{...opt,timeZone:'America/New_York'}).format(new Date());
  moscow.textContent=new Intl.DateTimeFormat('ru-RU',{...opt,timeZone:'Europe/Moscow'}).format(new Date());
  hk.textContent=new Intl.DateTimeFormat('zh-HK',{...opt,timeZone:'Asia/Hong_Kong'}).format(new Date());
}
setInterval(updateTime,1000);updateTime();

let chart;

async function loadData(){
  const ticker=document.getElementById('ticker').value.toUpperCase();

  const url=`https://iss.moex.com/iss/engines/stock/markets/shares/securities/${ticker}/candles.json?interval=24`;

  const res=await fetch(url);
  const data=await res.json();

  const candles=data.candles.data;

  if(!candles || candles.length===0){
    price.textContent="Нет данных";
    return;
  }

  const labels=candles.map(c=>c[6]); // время
  const prices=candles.map(c=>c[4]); // close

  price.textContent=`Текущая цена: ${prices.at(-1)}`;

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById('chart'),{
    type:'line',
    data:{
      labels:labels,
      datasets:[{label:ticker,data:prices,borderWidth:2}]
    }
  });
}

// SIMPLE AUTOSUGGEST (локальный)
const popular=["SBER","GAZP","LKOH","ROSN","YNDX","VTBR"];

function suggest(){
  const val=ticker.value.toUpperCase();
  const list=popular.filter(t=>t.includes(val));

  suggestions.innerHTML=list.map(t=>
    `<div onclick="selectTicker('${t}')" style='cursor:pointer'>${t}</div>`
  ).join('');
}

function selectTicker(t){
  ticker.value=t;
  suggestions.innerHTML="";
  loadData();
}
</script>
</body>
</html>
