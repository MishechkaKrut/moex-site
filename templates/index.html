<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>MOEX Tracker PRO</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {font-family: Arial;background:#0f172a;color:white;margin:0;padding:20px;}
    .container {max-width:1000px;margin:auto;}
    .card {background:#1e293b;padding:20px;border-radius:16px;margin-bottom:20px;box-shadow:0 10px 30px rgba(0,0,0,0.3);}    
    input {padding:12px;border-radius:10px;border:none;width:250px;}
    button {padding:12px 16px;border-radius:10px;border:none;background:#3b82f6;color:white;cursor:pointer;}
    #suggestions {margin-top:10px;background:#0f172a;border-radius:10px;overflow:hidden;}
    .suggest-item {padding:10px;cursor:pointer;border-bottom:1px solid #1e293b;}
    .suggest-item:hover {background:#3b82f6;}
  </style>
</head>
<body>
<div class="container">
  <h1>📊 MOEX Tracker PRO</h1>

  <div class="card">
    <h2>🌍 Время</h2>
    <p>Лондон: <span id="london"></span></p>
    <p>Нью-Йорк: <span id="ny"></span></p>
    <p>Москва: <span id="moscow"></span></p>
    <p>Гонконг: <span id="hk"></span></p>
  </div>

  <div class="card">
    <h2>🔍 Поиск акции</h2>
    <input type="text" id="ticker" placeholder="SBER" oninput="suggest()">
    <button onclick="loadData()">Загрузить</button>
    <div id="suggestions"></div>
    <h3 id="price"></h3>
  </div>

  <div class="card">
    <h2>📈 График (по месяцам)</h2>
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
// TIME
function updateTime(){
  const opt={hour:'2-digit',minute:'2-digit',second:'2-digit'};
  london.textContent=new Intl.DateTimeFormat('en-GB',{...opt,timeZone:'Europe/London'}).format(new Date());
  ny.textContent=new Intl.DateTimeFormat('en-US',{...opt,timeZone:'America/New_York'}).format(new Date());
  moscow.textContent=new Intl.DateTimeFormat('ru-RU',{...opt,timeZone:'Europe/Moscow'}).format(new Date());
  hk.textContent=new Intl.DateTimeFormat('zh-HK',{...opt,timeZone:'Asia/Hong_Kong'}).format(new Date());
}
setInterval(updateTime,1000);updateTime();

let chart;

async function loadData(){
  const ticker=document.getElementById('ticker').value.toUpperCase();

  // цена
  const priceRes=await fetch(`https://iss.moex.com/iss/engines/stock/markets/shares/securities/${ticker}.json`);
  const priceData=await priceRes.json();
  const marketData=priceData.marketdata.data[0];
  const lastPrice=marketData ? (marketData[12] || marketData[24]) : null;

  if(!lastPrice){
    price.textContent="Нет данных";
    return;
  }

  price.textContent=`💰 ${ticker}: ${lastPrice}`;

  // МЕСЯЧНЫЙ ГРАФИК
  // текущий год
  const currentYear = new Date().getFullYear();
  const fromDate = `${currentYear}-01-01`;

  const res=await fetch(`https://iss.moex.com/iss/history/engines/stock/markets/shares/securities/${ticker}.json?from=${fromDate}`);
  const data=await res.json();

  const history=data.history.data;

  if(!history || history.length===0){
    return;
  }

  // группируем по месяцам
  const monthly={};

  history.forEach(row=>{
    const date=row[1];
    const close=row[11];
    if(!close) return;

    const month=date.slice(0,7); // YYYY-MM

    monthly[month]=close; // берём последнее значение месяца
  });

  const labels=Object.keys(monthly);
  const prices=Object.values(monthly);

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById('chart'),{
    type:'line',
    data:{
      labels:labels,
      datasets:[{
        data:prices,
        tension:0.4,
        fill:true
      }]
    },
    options:{
      plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'white'}},y:{ticks:{color:'white'}}}
    }
  });
}

// AUTOSUGGEST
const popular=["SBER","GAZP","LKOH","ROSN","YNDX","VTBR","TCSG","MGNT"];

function suggest(){
  const val=ticker.value.toUpperCase();
  if(!val){suggestions.innerHTML="";return;}
  const list=popular.filter(t=>t.includes(val));
  suggestions.innerHTML=list.map(t=>
    `<div class='suggest-item' onclick="selectTicker('${t}')">${t}</div>`
  ).join('');
}

function selectTicker(t){
  ticker.value=t;
  suggestions.innerHTML="";
  loadData();
}
</script>
</body>
</html>
